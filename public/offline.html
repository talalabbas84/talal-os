<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Talal OS — Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0a0a0a;
        color: #fafafa;
        padding: 24px;
      }

      main {
        max-width: 360px;
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #a3a3a3;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Talal OS is offline</h1>
      <p>Reconnect to the internet and reopen the app to sync your dashboard.</p>
    </main>
  </body>
</html>
